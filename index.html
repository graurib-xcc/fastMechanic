<!DOCTYPE html>
<html>
<head>
  <title>FastMechanic AI</title>
  <style>
    body{
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
      padding:40px;
    }

    textarea{
      width:90%;
      height:120px;
      border-radius:10px;
      padding:10px;
      font-size:18px;
    }

    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:20px;
      border:none;
      border-radius:10px;
      background:#00b894;
      color:white;
      cursor:pointer;
    }

    #response{
      margin-top:30px;
      background:#222;
      padding:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>FastMechanic AI</h1>

<p>Describe your car problem</p>

<textarea id="question"></textarea>

<br>

<button onclick="askAI()">Diagnose</button>

<div id="response"></div>

<script>
async function askAI(){

  let question = document.getElementById("question").value;

  document.getElementById("response").innerHTML = "Thinking...";

  const response = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer YOUR_OPENAI_API_KEY"
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {
          role:"system",
          content:"You are an expert mechanic."
        },
        {
          role:"user",
          content:question
        }
      ]
    })
  });

  const data = await response.json();

  document.getElementById("response").innerHTML =
    data.choices[0].message.content;
}
</script>

</body>
</html>
